# OpenTelemetry Collector (observability profili)
# Servislerden OTLP trace/metric alır; şimdilik debug exporter'a yazar.
# İleride Langfuse / Tempo / Jaeger eklenebilir.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
