[project]
name = "agentic-schemas"
version = "0.1.0"
description = "Agentic Takım — paylaşılan sözleşmeler (ACP, Skill Contract, Agent Registry, Events). Sistemin kalbi."
requires-python = ">=3.12"
dependencies = ["pydantic>=2.9,<3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agentic_schemas"]
